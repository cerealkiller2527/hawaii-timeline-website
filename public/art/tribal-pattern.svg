<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="tribal" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Niho mano (shark teeth) - top band -->
      <path d="M0 0 L10 15 L20 0" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.3"/>
      <path d="M20 0 L30 15 L40 0" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.3"/>
      <path d="M40 0 L50 15 L60 0" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.3"/>
      <path d="M60 0 L70 15 L80 0" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.3"/>
      <path d="M80 0 L90 15 L100 0" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.3"/>
      <!-- Filled alternating teeth -->
      <path d="M0 0 L10 15 L20 0Z" fill="#32AD99" opacity="0.08"/>
      <path d="M40 0 L50 15 L60 0Z" fill="#32AD99" opacity="0.08"/>
      <path d="M80 0 L90 15 L100 0Z" fill="#32AD99" opacity="0.08"/>

      <!-- Parallel separator lines -->
      <line x1="0" y1="17" x2="100" y2="17" stroke="#32AD99" stroke-width="0.8" opacity="0.25"/>
      <line x1="0" y1="20" x2="100" y2="20" stroke="#32AD99" stroke-width="0.5" opacity="0.18"/>

      <!-- Ocean wave pattern -->
      <path d="M0 30 Q12.5 22 25 30 T50 30 T75 30 T100 30" fill="none" stroke="#32AD99" stroke-width="1.5" opacity="0.25"/>
      <path d="M0 36 Q12.5 28 25 36 T50 36 T75 36 T100 36" fill="none" stroke="#32AD99" stroke-width="0.8" opacity="0.18"/>

      <!-- Enata (human figures) -->
      <circle cx="25" cy="50" r="2.5" fill="#32AD99" opacity="0.2"/>
      <path d="M25 53 L25 62 M21 56 L29 56 M22 67 L25 62 L28 67" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.2"/>
      <circle cx="75" cy="50" r="2.5" fill="#32AD99" opacity="0.2"/>
      <path d="M75 53 L75 62 M71 56 L79 56 M72 67 L75 62 L78 67" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.2"/>

      <!-- Diamond/tapa pattern - center band -->
      <path d="M0 72 L12 65 L25 72 L12 79Z" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.22"/>
      <path d="M25 72 L37 65 L50 72 L37 79Z" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.22"/>
      <path d="M50 72 L62 65 L75 72 L62 79Z" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.22"/>
      <path d="M75 72 L87 65 L100 72 L87 79Z" fill="none" stroke="#32AD99" stroke-width="1" opacity="0.22"/>
      <!-- Diamond center dots -->
      <circle cx="12" cy="72" r="1.2" fill="#32AD99" opacity="0.25"/>
      <circle cx="37" cy="72" r="1.2" fill="#32AD99" opacity="0.25"/>
      <circle cx="62" cy="72" r="1.2" fill="#32AD99" opacity="0.25"/>
      <circle cx="87" cy="72" r="1.2" fill="#32AD99" opacity="0.25"/>

      <!-- Separator -->
      <line x1="0" y1="81" x2="100" y2="81" stroke="#32AD99" stroke-width="0.5" opacity="0.18"/>

      <!-- Ihe (spearhead) - bottom -->
      <path d="M12 85 L6 98 L12 94 L18 98Z" fill="#32AD99" opacity="0.12" stroke="#32AD99" stroke-width="0.6"/>
      <path d="M37 85 L31 98 L37 94 L43 98Z" fill="#32AD99" opacity="0.12" stroke="#32AD99" stroke-width="0.6"/>
      <path d="M62 85 L56 98 L62 94 L68 98Z" fill="#32AD99" opacity="0.12" stroke="#32AD99" stroke-width="0.6"/>
      <path d="M87 85 L81 98 L87 94 L93 98Z" fill="#32AD99" opacity="0.12" stroke="#32AD99" stroke-width="0.6"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#tribal)"/>
</svg>
